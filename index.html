<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十甲鐘氏 · 族譜</title>
    <style>
        :root {
            --box-width: 56px;
            --box-min-height: 90px;
            --box-padding: 5px;
            --gap-x: 18px;
            --gap-y: 36px;
            --border-color: #222;
            --bg-card: #fff;
            --bg-page: #fafafa;
            --text-primary: #111;
            --text-secondary: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimSun', 'STSong', '宋体', serif;
            background: var(--bg-page);
            min-height: 100vh;
            padding: 24px 16px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 16px 0;
            border-bottom: 1px solid #ddd;
        }

        h1 {
            color: var(--text-primary);
            font-size: 1.8em;
            font-weight: normal;
            letter-spacing: 8px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95em;
            letter-spacing: 3px;
        }

        .container {
            width: 100%;
            height: calc(100vh - 180px);
            overflow-x: auto;
            overflow-y: auto;
            padding: 10px;
            background: white;
        }

        .tree-wrapper {
            display: inline-block;
            min-width: 100%;
        }

        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        .level {
            display: flex;
            justify-content: center;
            gap: var(--gap-x);
            position: relative;
        }

        .branch {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .couple-card {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            padding: var(--box-padding);
            width: calc(var(--box-width) * 2 + 12px);
            min-height: calc(var(--box-min-height) + var(--box-padding) * 2);
            position: relative;
        }

        .couple-card:hover {
            border-color: #000;
        }

        .couple-card .husband,
        .couple-card .wife {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: var(--box-width);
            min-height: var(--box-min-height);
        }

        .couple-card .husband {
            border-right: 1px solid #ccc;
            padding-right: 2px;
            margin-right: 2px;
        }

        .couple-card .name {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.4em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--text-primary);
            height: 100%;
            max-height: 100px;
            text-align: center;
        }

        .couple-card .name.empty {
            color: #ccc;
        }

        .collapse-btn {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #222;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.15s;
        }

        .collapse-btn:hover {
            background: #000;
        }

        .collapsed-indicator {
            padding: 2px 8px;
            background: #f5f5f5;
            font-size: 10px;
            color: #666;
            margin-top: 6px;
            cursor: pointer;
        }

        .collapsed-indicator:hover {
            background: #eee;
        }

        .single-card {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            padding: var(--box-padding);
            width: var(--box-width);
            min-height: calc(var(--box-min-height) + var(--box-padding) * 2);
            position: relative;
        }

        .single-card:hover {
            border-color: #000;
        }

        .single-card .name {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.4em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--text-primary);
            height: 100%;
            max-height: 100px;
            text-align: center;
        }

        .parent-connector {
            width: 1px;
            height: 14px;
            background: #999;
        }

        .children-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .children-horizontal {
            width: 100%;
            height: 1px;
            background: #999;
            min-width: 40px;
        }

        .children-container {
            display: flex;
            gap: var(--gap-x);
        }

        .child-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .child-branch::before {
            content: '';
            width: 1px;
            height: 14px;
            background: #999;
        }

        .generation-tag {
            display: inline-block;
            background: #222;
            color: white;
            padding: 1px 6px;
            font-size: 10px;
            margin-right: 6px;
            margin-bottom: 4px;
            vertical-align: middle;
        }

        .toolbar {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid #eee;
        }

        .toolbar button {
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: white;
            font-family: 'SimSun', '宋体', serif;
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .toolbar button:hover {
            background: #222;
            color: white;
            border-color: #222;
        }

        .toolbar .divider {
            width: 1px;
            height: 16px;
            background: #ddd;
            margin: 0 4px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-box input {
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #ccc;
            width: 120px;
            font-family: 'SimSun', '宋体', serif;
        }

        .search-box input:focus {
            outline: none;
            border-color: #333;
        }

        .highlight {
            background: #f5f5f5 !important;
            border-color: #000 !important;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #ddd;
            background: #f9f9f9;
        }
        .footer p {
            color: #d00;
            font-size: 15px;
            font-weight: 500;
            margin: 0 0 8px 0;
        }

        @media print {
            body { background: white; padding: 10px; }
            .toolbar { display: none !important; }
            .header { display: none !important; }
            .footer { display: none !important; }
            .container { 
                overflow: visible !important; 
                height: auto !important;
            }
            .highlight { 
                background: yellow !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

    </style>

        // 初始化
        window.onload = function() {
            renderTree();
        };

        // 搜索功能
        let currentSearchKeyword = '';
        let collapsedNodes = new Set();
        
        // 初始化
        window.onload = function() {
            renderTree();
        };

        // 渲染树
        function renderTree() {
            const container = document.getElementById('treeContainer');
            container.innerHTML = '';
            
            const showGen = document.getElementById('showGenToggle').checked;
            
            const rootBranch = document.createElement('div');
            rootBranch.className = 'branch';
            
            if (familyData.name) {
                rootBranch.innerHTML = renderNode(familyData, 'data', 1, showGen);
            } else {
                const hasChildren = familyData.children && familyData.children.length > 0;
                let html = '';
                if (hasChildren) {
                    html += '<div class="children-wrapper" style="margin-left:0;">';
                    html += '<div class="children-container">';
                    familyData.children.forEach((child, index) => {
                        html += '<div class="child-branch">';
                        html += renderNode(child, 'data.children.' + index, 1, showGen);
                        html += '</div>';
                    });
                    html += '</div>';
                    html += '</div>';
                }
                rootBranch.innerHTML = html;
            }
            container.appendChild(rootBranch);
            
            // 搜索后应用高亮
            if (currentSearchKeyword !== '') {
                applySearchHighlight();
            }
        }

        // 搜索功能
        function searchFamily(keyword) {
            currentSearchKeyword = keyword.toLowerCase().trim();
            renderTree();
        }
        
        // 应用搜索高亮
        function applySearchHighlight() {
            if (currentSearchKeyword === '') return;
            
            const cards = document.querySelectorAll('.couple-card, .single-card');
            let firstMatch = null;
            
            cards.forEach(card => {
                const nameEl = card.querySelector('.name');
                if (nameEl) {
                    const name = nameEl.textContent.trim();
                    if (name.toLowerCase().includes(currentSearchKeyword)) {
                        card.classList.add('highlight');
                        if (!firstMatch) firstMatch = card;
                    }
                }
            });
            
            if (firstMatch) {
                firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }
        }

        // 清除搜索
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchFamily('');
        }

        // 打印家谱
        function printTree() {
            collapsedNodes.clear();
            currentSearchKeyword = '';
            renderTree();
            
            setTimeout(() => {
                const container = document.querySelector('.container');
                container.style.overflow = 'visible';
                container.style.height = 'auto';
                window.print();
                setTimeout(() => {
                    container.style.overflow = 'auto';
                    container.style.height = '';
                }, 100);
            }, 200);
        }

        // 导出PNG
        function exportPNG() {
            collapsedNodes.clear();
            currentSearchKeyword = '';
            renderTree();
            
            setTimeout(() => {
                const treeContainer = document.getElementById('treeContainer');
                const container = document.querySelector('.container');
                
                container.style.overflow = 'visible';
                container.style.height = 'auto';
                
                html2canvas(treeContainer, {
                    backgroundColor: '#ffffff',
                    scale: 2,
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = '鐘氏家譜.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    container.style.overflow = '';
                    container.style.height = '';
                    
                    alert('导出成功！');
                }).catch(err => {
                    container.style.overflow = '';
                    container.style.height = '';
                    alert('导出失败: ' + err.message);
                });
            }, 300);
        }

        // 导出SVG - 使用html2canvas生成图片再转为SVG
        function exportSVG() {
            collapsedNodes.clear();
            currentSearchKeyword = '';
            renderTree();
            
            setTimeout(() => {
                const treeContainer = document.getElementById('treeContainer');
                const container = document.querySelector('.container');
                
                container.style.overflow = 'visible';
                container.style.height = 'auto';
                
                // 使用html2canvas先生成图片，再包装成SVG
                html2canvas(treeContainer, {
                    backgroundColor: '#ffffff',
                    scale: 2,
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const width = canvas.width;
                    const height = canvas.height;
                    
                    // 创建SVG并嵌入PNG图片
                    const svgNS = "http://www.w3.org/2000/svg";
                    const svg = document.createElementNS(svgNS, "svg");
                    svg.setAttribute("width", width);
                    svg.setAttribute("height", height);
                    svg.setAttribute("xmlns", svgNS);
                    
                    const image = document.createElementNS(svgNS, "image");
                    image.setAttribute("width", width);
                    image.setAttribute("height", height);
                    image.setAttribute("href", imgData);
                    
                    svg.appendChild(image);
                    
                    // 转换为XML字符串并下载
                    const serializer = new XMLSerializer();
                    let svgString = serializer.serializeToString(svg);
                    svgString = '<?xml version="1.0" encoding="UTF-8"?>' + svgString;
                    
                    const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = '鐘氏家譜.svg';
                    link.href = url;
                    link.click();
                    
                    URL.revokeObjectURL(url);
                    container.style.overflow = '';
                    container.style.height = '';
                    
                    alert('导出成功！');
                }).catch(err => {
                    container.style.overflow = '';
                    container.style.height = '';
                    alert('导出失败: ' + err.message);
                });
            }, 300);
        }

        // 渲染节点
        function renderNode(node, path, generation, showGen) {
            let html = '';
            const nodeId = getNodeId(path);
            const isCollapsed = collapsedNodes.has(nodeId);
            
            if (showGen) {
                html += '<span class="generation-tag">' + generation + '代</span>';
            }
            
            if (node.couple) {
                const hasChildren = node.children && node.children.length > 0;
                html += renderCouple(node.couple[0], node.couple[1] || '', nodeId, hasChildren, isCollapsed);
                
                if (hasChildren && !isCollapsed) {
                    html += '<div class="parent-connector"></div>';
                    html += '<div class="children-wrapper">';
                    html += '<div class="children-horizontal"></div>';
                    html += '<div class="children-container">';
                    node.children.forEach((child, index) => {
                        html += '<div class="child-branch">';
                        html += renderNode(child, path + '.children.' + index, generation + 1, showGen);
                        html += '</div>';
                    });
                    html += '</div>';
                    html += '</div>';
                } else if (hasChildren && isCollapsed) {
                    html += '<div class="collapsed-indicator" onclick="toggleCollapse(\'' + nodeId + '\')">▼ ' + node.children.length + ' 人</div>';
                }
            } else if (node.name) {
                html += renderSingle(node.name, nodeId);
            }
            
            return html;
        }

        // 切换折叠状态
        function toggleCollapse(nodeId) {
            if (collapsedNodes.has(nodeId)) {
                collapsedNodes.delete(nodeId);
            } else {
                collapsedNodes.add(nodeId);
            }
            renderTree();
        }

        // 获取节点ID
        function getNodeId(path) {
            return path.replace(/\[/g, '_').replace(/\]/g, '_').replace(/\./g, '_');
        }

        // 渲染夫妻
        function renderCouple(husbandName, wifeName, nodeId, hasChildren, isCollapsed) {
            let collapseBtn = '';
            if (hasChildren) {
                const arrow = isCollapsed ? '▶' : '▼';
                collapseBtn = '<span class="collapse-btn" onclick="event.stopPropagation();toggleCollapse(\'' + nodeId + '\')">' + arrow + '</span>';
            }
            
            if (wifeName) {
                return `
                    <div class="couple-card" data-name="${husbandName}">
                        ${collapseBtn}
                        <div class="husband"><div class="name">${husbandName}</div></div>
                        <div class="wife"><div class="name">${wifeName}</div></div>
                    </div>
                `;
            } else {
                return `
                    <div class="single-card" data-name="${husbandName}">
                        ${collapseBtn}
                        <div class="name">${husbandName}</div>
                    </div>
                `;
            }
        }

        // 渲染单人
        function renderSingle(name, nodeId) {
            return `
                <div class="single-card" data-name="${name}">
                    <div class="name">${name}</div>
                </div>
            `;
        }

    </script>
